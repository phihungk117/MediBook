spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/medibook_db
    username: postgres
    password: 123456789   # ← đổi thành password PostgreSQL của bạn
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8080

jwt:
  secret: mySecretKey1234567890ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijk
  expiration: 86400000

file:
  upload-dir: ./uploads